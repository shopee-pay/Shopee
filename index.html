
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

.header {
  background: #ee4d2d;
  padding: 15px;
  color: white;
  font-size: 20px;
}

.container {
  display: flex;
  justify-content: center;
  margin-top: 50px;
}

.login-box {
  background: white;
  padding: 25px;
  width: 300px;
  border-radius: 8px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.login-box h2 {
  text-align: center;
}

.input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.btn {
  width: 100%;
  padding: 10px;
  background: #ee4d2d;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

.btn:hover {
  background: #d84324;
}

.footer {
  text-align: center;
  margin-top: 15px;
  font-size: 12px;
}
</style>
</head>

<body>

<div class="header">Shopee Clone</div>

<div class="container">
  <div class="login-box">
    <h2>Shopee</h2>
    <input type="text" class="input" placeholder="Username / Email">
    <input type="password" class="input" placeholder="Password">
    <button class="btn">Login</button>
    <div class="footer">© 2026 Demo UI</div>
  </div>
</div>

</body>
</html>
