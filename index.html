<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plugin Shopee</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f5f5f5;
}

header {
  background: #ee4d2d;
  color: white;
  padding: 15px;
  text-align: center;
  font-weight: bold;
}

.container {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
}

.card img {
  width: 100%;
}

.price {
  color: #ee4d2d;
  font-weight: bold;
}

button {
  background: #ee4d2d;
  color: white;
  border: none;
  padding: 8px;
  width: 100%;
  border-radius: 5px;
}
</style>
</head>

<body>

<header>Produk Shopee</header>

<div class="container" id="produk"></div>

<script>
const dataProduk = [
  {
    nama: "Sepatu Keren",
    harga: "Rp50.000",
    gambar: "https://via.placeholder.com/150",
    link: "https://shopee.co.id/"
  },
  {
    nama: "Tas Murah",
    harga: "Rp30.000",
    gambar: "https://via.placeholder.com/150",
    link: "https://shopee.co.id/"
  }
];

let tampil = "";

dataProduk.forEach(p => {
  tampil += `
    <div class="card">
      <img src="${p.gambar}">
      <p>${p.nama}</p>
      <p class="price">${p.harga}</p>
      <button onclick="beli('${p.link}')">Beli</button>
    </div>
  `;
});

document.getElementById("produk").innerHTML = tampil;

function beli(link) {
  window.location.href = link;
}
</script>

</body>
</html>
