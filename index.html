<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
    }

    .container {
        max-width: 400px;
        margin: auto;
        background: white;
        min-height: 100vh;
        padding: 20px;
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    .logo {
        text-align: center;
        font-size: 40px;
        color: #ee4d2d;
        margin-bottom: 20px;
    }

    .input-group {
        margin-bottom: 15px;
    }

    input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ddd;
        border-radius: 5px;
        font-size: 14px;
    }

    .forgot {
        text-align: right;
        font-size: 12px;
        color: #007bff;
        margin-top: 5px;
    }

    .btn-login {
        width: 100%;
        padding: 12px;
        background: #ccc;
        border: none;
        border-radius: 5px;
        color: white;
        font-size: 16px;
        margin-top: 10px;
    }

    .divider {
        text-align: center;
        margin: 20px 0;
        color: #999;
    }

    .social-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 12px;
        margin-bottom: 10px;
        cursor: pointer;
        background: #fff;
    }

    .social-btn img {
        width: 20px;
        margin-right: 10px;
    }

    .footer {
        text-align: center;
        font-size: 13px;
        margin-top: 20px;
    }

    .footer a {
        color: #007bff;
        text-decoration: none;
    }

    .fingerprint {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
        font-size: 13px;
    }

    .switch {
        width: 40px;
        height: 20px;
        background: #4CAF50;
        border-radius: 20px;
        position: relative;
    }

    .switch::after {
        content: '';
        width: 18px;
        height: 18px;
        background: white;
        border-radius: 50%;
        position: absolute;
        top: 1px;
        right: 1px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Log In</h2>

    <div class="logo">  </div>

    <div class="input-group">
        <input type="text" placeholder="No. Handphone/Email/Username">
    </div>

    <div class="input-group">
        <input type="password" placeholder="Password">
        <div class="forgot">Lupa?</div>
    </div>

    <button class="btn-login">Log In</button>

    <div class="divider">ATAU</div>

    <div class="social-btn">
        <img src="https://img.icons8.com/color/48/google-logo.png">
        Log In dengan Google
    </div>

    <div class="social-btn">
        <img src="https://img.icons8.com/color/48/facebook.png">
        Log In dengan Facebook
    </div>

    <div class="social-btn">
        🔑 Login dengan Passkey
    </div>

    <div class="footer">
        Belum punya akun? <a href="#">Daftar</a>
    </div>

    <div class="fingerprint">
        <span>Aktifkan Autentikasi Sidik Jari</span>
        <div class="switch"></div>
    </div>
</div>

</body>
</html>
