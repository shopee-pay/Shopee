
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Pembayaran DANA</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        padding: 20px;
        border-radius: 15px;
        width: 300px;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    .logo {
        width: 100px;
        margin-bottom: 10px;
    }

    h2 {
        color: #00AEEF;
    }

    .btn {
        background: #00AEEF;
        color: white;
        padding: 12px;
        border: none;
        border-radius: 10px;
        width: 100%;
        font-size: 16px;
        cursor: pointer;
        margin-top: 15px;
    }

    .btn:hover {
        background: #008fcc;
    }

    .nomor {
        margin-top: 10px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/72/Logo_dana_blue.svg" class="logo">
    
    <h2>Pembayaran DANA</h2>
    
    <p>Silakan transfer ke nomor:</p>
    
    <div class="nomor">081234567890</div>

    <button class="btn" onclick="bayar()">Bayar Sekarang</button>
</div>

<script>
function bayar() {
    alert("Silakan buka aplikasi shopee dan lakukan pembayaran.");
    // Bisa redirect ke link DANA / QRIS
    // window.location.href = "https://link.dana.id/...";
}
</script>

</body>
</html>
