<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyShop App</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* HEADER */
.header {
  background: #ff5722;
  padding: 10px;
  color: white;
}

.search {
  display: flex;
  background: white;
  border-radius: 8px;
  padding: 5px 10px;
}

.search input {
  border: none;
  flex: 1;
  outline: none;
}

/* MENU ICON */
.menu {
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: white;
}

.menu div {
  text-align: center;
  font-size: 12px;
}

.menu i {
  font-size: 20px;
  color: #ff5722;
}

/* PRODUK */
.products {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 8px;
}

.price {
  color: #ff5722;
  font-weight: bold;
}

/* NAVBAR BAWAH */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid #ddd;
}

.navbar i {
  font-size: 20px;
  color: #888;
}

.navbar i.active {
  color: #ff5722;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="search">
    <input type="text" placeholder="Cari produk...">
    <i class="fas fa-search"></i>
  </div>
</div>

<!-- MENU -->
<div class="menu">
  <div><i class="fas fa-home"></i><br>Home</div>
  <div><i class="fas fa-list"></i><br>Kategori</div>
  <div><i class="fas fa-shopping-cart"></i><br>Keranjang</div>
  <div><i class="fas fa-user"></i><br>Akun</div>
</div>

<!-- PRODUK -->
<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <div>Produk 1</div>
    <div class="price">Rp10.000</div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <div>Produk 2</div>
    <div class="price">Rp20.000</div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <div>Produk 3</div>
    <div class="price">Rp30.000</div>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/150">
    <div>Produk 4</div>
    <div class="price">Rp40.000</div>
  </div>

</div>

<!-- NAVBAR -->
<div class="navbar">
  <i class="fas fa-home active"></i>
  <i class="fas fa-list"></i>
  <i class="fas fa-shopping-cart"></i>
  <i class="fas fa-user"></i>
</div>

</body>
</html>
